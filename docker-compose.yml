services:
  postgres:
    image: postgres:17-alpine
    container_name: voice-ordering-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voice_ordering

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voice_ordering"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend

    container_name: voice-ordering-backend

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voice_ordering

    ports:
      - "3000:3000"

    volumes:
      - ./backend:/app
      - /app/node_modules

    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run dev
      "

  frontend:
    build:
      context: ./frontend

    container_name: voice-ordering-frontend

    depends_on:
      - backend

    environment:
      VITE_API_URL: http://localhost:3000

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    command: npm run dev -- --host

volumes:
  postgres-data:
